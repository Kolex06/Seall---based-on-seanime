name: Build Electron App

on:
  workflow_call:
    #    secrets:
    #      SUBMODULE_PAT:
    #        required: true
    outputs:
      appVersion:
        description: "The version of the app"
        value: ${{ jobs.build-electron.outputs.app_version }}

jobs:
  build-electron:
    strategy:
      fail-fast: false
      matrix:
        # IDs:
        # - seall-denshi-darwin-arm
        # - seall-denshi-darwin-intel
        # - seall-denshi-linux
        # - seall-denshi-windows
        include:
          # For Mac
          - os: 'macos-latest'
            id: 'seall-denshi-darwin-arm64'
            go_binary_id: 'seall-server-darwin' # Artifact: go-seall-server-darwin (contains both arm64 and x86_64)
            electron_args: '--mac --arm64'
          # For Linux
          - os: 'ubuntu-latest'
            id: 'seall-denshi-linux-x64'
            go_binary_id: 'seall-server-linux' # Artifact: go-seall-server-linux (contains x86_64)
            electron_args: '--linux --x64'
          # For Windows
          - os: 'windows-latest'
            id: 'seall-denshi-windows-x64'
            go_binary_id: 'seall-server-windows' # Artifact: go-seall-server-windows (contains x86_64)
            electron_args: '--win --x64'

    runs-on: ${{ matrix.os }}
    outputs:
      app_version: ${{ steps.get-version.outputs.version }}

    steps:
      - name: Checkout code and submodules 📂
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      #          submodules: recursive
      #          lfs: true
      #          token: ${{ secrets.SUBMODULE_PAT }}

      - name: Setup Node.js 📦
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Get package version 📦
        id: get-version
        run: |
          NODE_VERSION=$(node -p "require('./seall-denshi/package.json').version")
          echo "version=$NODE_VERSION" >> $GITHUB_OUTPUT
        shell: bash

      # Install dependencies
      - name: Install dependencies (Ubuntu) 📦
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libnss3-dev libxss-dev libasound2-dev

      # Download the web folders
      # TODO Uncomment if building web
      - name: Download web folder artifact 📥
        uses: actions/download-artifact@v4
        with:
          name: web-denshi
          path: web-denshi

      # Move web-denshi folder into seall-denshi
      - name: Move web-denshi folder 🚚
        run: mv web-denshi seall-denshi/
        shell: bash

      - name: Ensure binaries folder exists (UNIX)
        if: matrix.os == 'macos-latest' || matrix.os == 'ubuntu-latest'
        run: mkdir -p ./seall-denshi/binaries

      - name: Ensure binaries folder exists (Windows)
        if: matrix.os == 'windows-latest'
        run: mkdir .\seall-denshi\binaries

      # Download the server binaries based on matrix.go_binary_id
      - name: Download server binaries 📥
        uses: actions/download-artifact@v4
        with:
          name: go-${{ matrix.go_binary_id }}
          path: ./seall-denshi/binaries

      # Extract server binaries
      #      - name: Extract server binaries (macOS x64) 📂
      #        if: matrix.os == 'macos-latest' && matrix.id == 'seall-denshi-darwin-x64'
      #        # Extracts seall-server-darwin-arm64 and seall-server-darwin-amd64
      #        # Only keep seall-server-darwin-amd64
      #        run: |
      #          tar -xf ./seall-denshi/binaries/binaries-${{ matrix.go_binary_id }}.tar -C ./seall-denshi/binaries
      #          # Remove the other binary
      #          rm -rf ./seall-denshi/binaries/seall-server-darwin-arm64

      - name: Extract server binaries (macOS arm64) 📂
        if: matrix.os == 'macos-latest' && matrix.id == 'seall-denshi-darwin-arm64'
        # Extracts seall-server-darwin-arm64 and seall-server-darwin-amd64
        # Only keep seall-server-darwin-arm64
        run: |
          tar -xf ./seall-denshi/binaries/binaries-${{ matrix.go_binary_id }}.tar -C ./seall-denshi/binaries
          # Remove the other binary
          rm -rf ./seall-denshi/binaries/seall-server-darwin-amd64
          rm -rf ./seall-denshi/binaries/binaries-${{ matrix.go_binary_id }}.tar

      - name: Extract server binaries (Linux) 📂
        if: matrix.os == 'ubuntu-latest' && matrix.id == 'seall-denshi-linux-x64'
        # Extracts seall-server-linux-amd64
        run: |
          tar -xf ./seall-denshi/binaries/binaries-${{ matrix.go_binary_id }}.tar -C ./seall-denshi/binaries
          rm -rf ./seall-denshi/binaries/binaries-${{ matrix.go_binary_id }}.tar

      - name: Extract server binaries (Windows) 📂
        if: matrix.os == 'windows-latest'
        # Extracts seall-server-windows-amd64
        run: |
          7z x ".\seall-denshi\binaries\binaries-${{ matrix.go_binary_id }}.zip" "-o./seall-denshi/binaries/"
          del ".\seall-denshi\binaries\binaries-${{ matrix.go_binary_id }}.zip"

      #      # Copy app icon
      #      - name: Copy app icon 📝
      #        run: |
      #          mkdir -p ./seall-denshi/assets
      #          cp ./seall-desktop/src-tauri/app-icon.png ./seall-denshi/assets/
      #        shell: bash

      # Install and build
      - name: Install and build 📦️
        run: |
          cd seall-denshi
          npm install
          npm run build -- ${{ matrix.electron_args }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Upload the artifacts
      - name: Upload Electron artifacts 📤
        uses: actions/upload-artifact@v4
        with:
          name: electron-${{ matrix.id }}
          path: |
            ./seall-denshi/dist/seall-denshi-*
            ./seall-denshi/dist/*.yml
